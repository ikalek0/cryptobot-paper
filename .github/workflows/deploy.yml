name: Validate & Deploy cryptobot-paper
on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Syntax check
        run: node --check src/server.js
      # Railway auto-deploys from this push automatically
      # No extra steps needed - Railway watches this repo
